<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Команда трансформации SAP · Орг. структура</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════════
   DESIGN TOKENS
   ════════════════════════════════════════════════════════════════ */
:root {
  --bg:        #FFFFFF;
  --bg-soft:   #FAFAF9;
  --bg-band:   #F7F7F5;
  --ink:       #0A0A0A;
  --ink-2:     #404040;
  --ink-3:     #737373;
  --ink-4:     #A3A3A3;
  --line:      #EAEAE8;
  --line-2:    #F0F0EE;
  --accent:    #1C64BE;   /* SAP blue (PMS 7455) — single accent, used sparingly */
  --accent-soft: #E6F1FB;
  --lead-ring: #00B7F0;   /* SAP light blue */

  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 16px;

  --shadow-sm: 0 1px 2px rgba(10,10,10,0.04);
  --shadow-md: 0 8px 24px -12px rgba(10,10,10,0.10), 0 2px 4px rgba(10,10,10,0.03);

  --font-sans: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

  --max-w: 1240px;
}

/* ════════════════════════════════════════════════════════════════════
   BASE
   ════════════════════════════════════════════════════════════════ */
*,*::before,*::after { box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
}
img { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }
::selection { background: var(--accent-soft); color: var(--ink); }

/* ════════════════════════════════════════════════════════════════════
   HEADER
   ════════════════════════════════════════════════════════════════ */
.site-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.85);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--line);
}
.site-header__inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 14px 32px;
  display: flex; align-items: center; gap: 16px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; color: inherit;
}
.brand__dot {
  width: 10px; height: 10px; border-radius: 999px;
  background: var(--lead-ring);
  box-shadow: 0 0 0 4px rgba(0,183,240,0.14);
}
.brand__text {
  font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
}
.brand__sub {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.nav {
  display: flex; gap: 2px; margin-left: 28px;
}
.nav a {
  text-decoration: none;
  color: var(--ink-2);
  font-size: 13px;
  padding: 6px 12px;
  border-radius: var(--r-sm);
  transition: background 160ms ease, color 160ms ease;
}
.nav a:hover { background: var(--bg-band); color: var(--ink); }
.nav a.is-active { color: var(--ink); background: var(--bg-band); }

.search {
  margin-left: auto;
  position: relative;
  display: flex; align-items: center;
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 0 12px;
  width: 280px;
  transition: border-color 160ms ease, box-shadow 160ms ease;
}
.search:focus-within {
  border-color: var(--ink-4);
  box-shadow: 0 0 0 3px rgba(10,10,10,0.04);
}
.search svg { color: var(--ink-3); flex-shrink: 0; }
.search input {
  border: none; outline: none; background: transparent;
  padding: 9px 8px;
  width: 100%;
  font-size: 13px;
  color: var(--ink);
}
.search input::placeholder { color: var(--ink-4); }
.kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-4);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 1px 5px;
  background: var(--bg);
}

/* ════════════════════════════════════════════════════════════════════
   LAYOUT
   ════════════════════════════════════════════════════════════════ */
main { padding: 0 32px 120px; }
.container {
  max-width: var(--max-w);
  margin: 0 auto;
}

/* HERO */
.hero { padding: 88px 0 56px; }
.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.eyebrow::before {
  content: "";
  width: 6px; height: 6px; border-radius: 999px;
  background: var(--lead-ring);
}
.hero h1 {
  margin: 20px 0 0;
  font-size: clamp(36px, 4.8vw, 56px);
  line-height: 1.04;
  letter-spacing: -0.035em;
  font-weight: 600;
  max-width: 880px;
}
.hero h1 em {
  font-style: normal;
  color: var(--accent);
}
.hero p {
  margin: 24px 0 0;
  max-width: 640px;
  font-size: 16px;
  line-height: 1.6;
  color: var(--ink-2);
}

/* Stat strip */
.stats {
  margin-top: 56px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.stat {
  padding: 24px 28px 24px 0;
  border-right: 1px solid var(--line);
}
.stat:last-child { border-right: 0; padding-right: 0; }
.stat__num {
  font-size: 38px;
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: 1;
  font-feature-settings: "tnum";
}
.stat__label {
  margin-top: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-3);
}

/* ════════════════════════════════════════════════════════════════════
   SECTION
   ════════════════════════════════════════════════════════════════ */
.section {
  padding: 80px 0 8px;
  border-top: 1px solid var(--line-2);
  margin-top: 16px;
}
.section:first-of-type { border-top: 0; padding-top: 88px; }

.section__head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 24px; flex-wrap: wrap;
  margin-bottom: 36px;
}
.section__title-wrap { display: flex; align-items: baseline; gap: 18px; }
.section__num {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-4);
  letter-spacing: 0.06em;
}
.section__title {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin: 0;
}
.section__meta {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-3);
  display: flex; gap: 18px;
}
.section__meta span::before {
  content: "";
  display: inline-block;
  width: 4px; height: 4px; border-radius: 999px;
  background: var(--ink-4);
  margin-right: 8px; vertical-align: middle;
}
.section__desc {
  max-width: 580px;
  font-size: 14px;
  color: var(--ink-2);
  margin: -20px 0 36px;
  padding-left: 60px;
}

/* Sub-group (e.g. SAP FI/CO within Functional) */
.subgroup {
  margin-top: 40px;
}
.subgroup:first-child { margin-top: 0; }
.subgroup__head {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 18px;
}
.subgroup__title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.005em;
  color: var(--ink);
}
.subgroup__tag {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-3);
  background: var(--bg-band);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 2px 7px;
  letter-spacing: 0.04em;
}
.subgroup__rule {
  flex: 1;
  height: 1px;
  background: var(--line-2);
}
.subgroup__count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-4);
  letter-spacing: 0.04em;
}

/* ════════════════════════════════════════════════════════════════════
   PERSON GRID — flex wrap so empty cells never appear
   ════════════════════════════════════════════════════════════════ */
.people {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.person {
  flex: 1 1 260px;
  max-width: calc(25% - 6px);
  display: flex; align-items: center; gap: 14px;
  padding: 16px 18px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 12px;
  transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
  min-width: 0;
}
.person:hover {
  border-color: #D4D4D2;
  box-shadow: 0 6px 16px -10px rgba(0,0,0,0.12);
  transform: translateY(-1px);
}

.avatar {
  width: 44px; height: 44px; border-radius: 999px;
  background: var(--bg-band);
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
  border: 1px solid var(--line);
}
.avatar img {
  width: 100%; height: 100%; object-fit: cover;
  display: block;
}
.avatar--placeholder {
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-4);
  background:
    radial-gradient(circle at 30% 30%, #F7F7F5, #ECECE9);
  border-color: var(--line);
}
.avatar--lead {
  border-color: var(--lead-ring);
  box-shadow: 0 0 0 2px #FFFFFF, 0 0 0 3px var(--lead-ring);
}

.person__body { min-width: 0; flex: 1; }
.person__name {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.005em;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex; align-items: center; gap: 6px;
}
.person__role {
  margin-top: 3px;
  font-size: 12.5px;
  color: var(--ink-3);
  letter-spacing: 0.005em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap;
}

/* Inline chips — Lead / External */
.chip {
  display: inline-flex; align-items: center;
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--line);
  background: var(--bg-soft);
  color: var(--ink-3);
  flex-shrink: 0;
  line-height: 1.4;
}
.chip--lead {
  color: var(--accent);
  background: var(--accent-soft);
  border-color: rgba(28,100,190,0.22);
}

/* Outsource (contractor) marker — muted corporate burgundy, clearly distinct from staff */
.chip--out {
  color: #9E2B3D;
  background: #FBF0F2;
  border-color: #EBC9CF;
}
.chip--out::before {
  content: "";
  width: 5px; height: 5px; border-radius: 999px;
  background: #BE4456;
  margin-right: 5px;
}
/* Outsource person card — burgundy accent edge + faint warm tint */
.person--out {
  background: #FDF6F7;
  border-left: 2px solid #C8556A;
}
.person--out:hover { border-color: #E0B6BD; border-left-color: #A23446; }
.person--out .avatar { border-color: #EBC9CF; }

/* Outsource sub-divider inside a team subgroup */
.outsource-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0 14px;
}
.outsource-divider span {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #9E2B3D;
  background: #FBF0F2;
  border: 1px solid #EBC9CF;
  border-radius: var(--r-sm);
  padding: 2px 9px;
}
.outsource-divider::after {
  content: ""; flex: 1; height: 1px; background: var(--line-2);
}
/* KPI: tint the outsource stat number burgundy so the split reads instantly */
.stat--out .stat__num { color: #9E2B3D; }

/* Leadership feature card */
.lead-card {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 28px;
  padding: 28px 32px;
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  position: relative;
  overflow: hidden;
}
.lead-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--lead-ring);
}
.lead-card .avatar {
  width: 88px; height: 88px;
}
.lead-card__name {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin: 0;
}
.lead-card__role {
  margin-top: 4px;
  font-size: 14px;
  color: var(--ink-2);
}
.lead-card__desc {
  margin-top: 10px;
  font-size: 13px;
  color: var(--ink-3);
  max-width: 540px;
}
.lead-card__tag {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  border: 1px solid var(--accent);
  background: var(--accent-soft);
  padding: 4px 10px;
  border-radius: 999px;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

/* External / contractor inline pill is handled by .chip */

/* ════════════════════════════════════════════════════════════════════
   FOOTER
   ════════════════════════════════════════════════════════════════ */
.site-footer {
  margin-top: 120px;
  border-top: 1px solid var(--line);
  padding: 32px 0;
}
.site-footer__inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 32px;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-4);
  letter-spacing: 0.04em;
}

/* ════════════════════════════════════════════════════════════════════
   SEARCH STATES
   ════════════════════════════════════════════════════════════════ */
.is-dimmed { opacity: 0.18; filter: saturate(0.6); transition: opacity 200ms, filter 200ms; }
.section--hidden { display: none; }
.subgroup--hidden { display: none; }

.no-results {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink-3);
}
.no-results__title {
  font-size: 18px; font-weight: 500;
  color: var(--ink);
  margin-bottom: 6px;
}

/* ════════════════════════════════════════════════════════════════════
   RESPONSIVE
   ════════════════════════════════════════════════════════════════ */
@media (max-width: 1180px) {
  .person { max-width: calc(33.333% - 6px); }
}
@media (max-width: 1024px) {
  .person { max-width: calc(50% - 4px); }
  .nav { display: none; }
}
@media (max-width: 768px) {
  main { padding: 0 20px 80px; }
  .site-header__inner { padding: 12px 20px; }
  .site-footer__inner { padding: 0 20px; }
  .search { width: auto; flex: 1; max-width: 220px; }
  .search .kbd { display: none; }
  .hero { padding: 56px 0 32px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .stat { padding: 20px 16px 20px 0; }
  .stat:nth-child(2) { border-right: 0; }
  .stat:nth-child(3), .stat:nth-child(4) {
    border-top: 1px solid var(--line);
  }
  .person { max-width: 100%; flex-basis: 100%; }
  .lead-card {
    grid-template-columns: 1fr;
    text-align: left;
  }
  .lead-card .avatar { width: 64px; height: 64px; }
  .lead-card__tag { justify-self: start; }
  .section { padding-top: 56px; }
  .section__desc { padding-left: 0; margin-top: -16px; }
  .section__head { margin-bottom: 24px; }
  .brand__sub { display: none; }
  .subgroup__head { flex-wrap: wrap; }
  .subgroup__rule { display: none; }
  .subgroup__count { margin-left: auto; }
}

/* ════════════════════════════════════════════════════════════════════
   COMPANY BADGE (outsource affiliation)
   ════════════════════════════════════════════════════════════════ */
.chip--company {
  color: var(--accent);
  background: var(--accent-soft);
  border-color: rgba(28,100,190,0.22);
  font-weight: 500;
}

/* ════════════════════════════════════════════════════════════════════
   TEAM MODULE — lead (central node) → team, with rail + connectors
   ════════════════════════════════════════════════════════════════ */
.team {
  position: relative;
  display: flex; align-items: center;
  padding: 22px 24px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background:
    radial-gradient(140% 120% at 0 50%, rgba(0,183,240,0.05), transparent 52%),
    linear-gradient(180deg, var(--bg-soft), var(--bg));
  box-shadow: var(--shadow-md);
  transition: box-shadow 200ms ease;
}
.team__lead { position: relative; z-index: 3; flex: 0 0 264px; width: 264px; }
.team__lead .person {
  width: 100%; max-width: 100%;
  background: var(--bg);
  border: 1px solid rgba(28,100,190,0.38);
  box-shadow: 0 12px 30px -16px rgba(28,100,190,0.55), var(--shadow-sm);
  padding: 16px 18px;
}
.team__lead .avatar { width: 52px; height: 52px; }
.team__lead::after {           /* connector stub: lead → rail */
  content: ""; position: absolute; z-index: 1;
  top: 50%; right: -26px; width: 26px; height: 2px; transform: translateY(-50%);
  background: linear-gradient(90deg, var(--lead-ring), rgba(0,183,240,0));
}
.team__rail {                  /* vertical divider / spine */
  position: relative; z-index: 2; flex: 0 0 2px; width: 2px;
  align-self: stretch; margin: 8px 0;
  background: linear-gradient(180deg, transparent, rgba(28,100,190,0.28) 14%, rgba(28,100,190,0.28) 86%, transparent);
  border-radius: 2px;
}
.team__rail::before {          /* node where lead meets the spine */
  content: ""; position: absolute; left: 50%; top: 50%;
  width: 9px; height: 9px; transform: translate(-50%,-50%); border-radius: 999px;
  background: var(--lead-ring);
  box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px rgba(0,183,240,0.25);
}
.team__members {
  flex: 1; min-width: 0; margin-left: 28px;
  display: flex; flex-wrap: wrap; gap: 8px;
}
.team__members .person { flex: 1 1 220px; max-width: calc(50% - 4px); }

/* hover the lead → highlight the whole team */
.team.is-team-hover { box-shadow: 0 18px 44px -20px rgba(28,100,190,0.32), var(--shadow-md); }
.team.is-team-hover .team__lead .person { border-color: var(--accent); }
.team.is-team-hover .team__members .person { border-color: rgba(28,100,190,0.42); }

/* Functional sub-direction grouping inside a team (e.g. SD / MM) */
.team__members { gap: 18px 16px; align-items: flex-start; align-content: flex-start; }
.func-group {
  flex: 1 1 240px; min-width: 0;
  display: flex; flex-direction: column; gap: 8px;
}
.func-group__label {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-3);
  white-space: nowrap;
}
.func-group__label::after {
  content: ""; flex: 1; height: 1px; background: var(--line-2);
}
/* override the default 2-up member sizing — cards fill their direction column */
.team__members .func-group .person { flex: 1 1 auto; max-width: 100%; }
@media (max-width: 920px) {
  .func-group { flex-basis: 100%; }
}

/* Outsource KPI shown as "4 + 2" (category + external contractors) */
.stat__plus { color: var(--ink-3); font-size: 0.6em; font-weight: 500; letter-spacing: -0.01em; }

/* ════════════════════════════════════════════════════════════════════
   DEVELOPMENT — compact product-card carousel + Expanded/Compact toggle
   ════════════════════════════════════════════════════════════════ */
.dev-toolbar { display: flex; align-items: center; gap: 12px; margin: -8px 0 20px; }
.dev-toolbar .seg {
  display: inline-flex; gap: 2px; padding: 2px;
  border: 1px solid var(--line); border-radius: 999px; background: var(--bg-soft);
}
.dev-toolbar .seg button {
  border: 0; background: transparent;
  font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--ink-3); padding: 5px 13px; border-radius: 999px;
  transition: background 160ms ease, color 160ms ease;
}
.dev-toolbar .seg button.is-on { background: var(--bg); color: var(--ink); box-shadow: var(--shadow-sm); }
.dev-toolbar__hint { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-4); letter-spacing: 0.04em; }

.carousel {
  display: flex; gap: 12px; overflow-x: auto;
  padding: 6px 2px 14px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
}
.carousel::-webkit-scrollbar { height: 8px; }
.carousel::-webkit-scrollbar-thumb { background: var(--line); border-radius: 999px; }
.carousel::-webkit-scrollbar-track { background: transparent; }
.pcard {
  scroll-snap-align: start; flex: 0 0 202px; width: 202px;
  display: flex; flex-direction: column; gap: 10px;
  padding: 16px; border: 1px solid var(--line); border-radius: 14px;
  background: var(--bg); box-shadow: var(--shadow-sm);
  transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
}
.pcard:hover { border-color: #D4D4D2; box-shadow: 0 8px 20px -12px rgba(0,0,0,0.14); transform: translateY(-2px); }
.pcard .avatar { width: 48px; height: 48px; }
.pcard.avatar--leadwrap .avatar { } /* reserved */
.pcard__team {
  font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-4);
}
.pcard__name { font-size: 13.5px; font-weight: 500; letter-spacing: -0.005em; color: var(--ink); }
.pcard__role { margin-top: 2px; font-size: 12px; color: var(--ink-3); }
.pcard__badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 2px; }
.pcard.person--out { background: #FDF6F7; border-left: 2px solid #C8556A; }
.pcard.person--out:hover { border-left-color: #A23446; }
.pcard--lead { border-color: rgba(28,100,190,0.38); box-shadow: 0 10px 26px -16px rgba(28,100,190,0.5), var(--shadow-sm); }

.carousel.is-expanded { flex-wrap: wrap; overflow-x: visible; scroll-snap-type: none; }
.carousel.is-expanded .pcard { flex: 1 1 202px; }

/* ════════════════════════════════════════════════════════════════════
   RESPONSIVE — team module & carousel
   ════════════════════════════════════════════════════════════════ */
@media (max-width: 920px) {
  .team { flex-direction: column; align-items: stretch; }
  .team__lead { width: 100%; flex: none; }
  .team__lead::after {           /* point downward on stack */
    top: auto; bottom: -22px; right: auto; left: 50%;
    width: 2px; height: 22px; transform: translateX(-50%);
    background: linear-gradient(180deg, var(--lead-ring), rgba(0,183,240,0));
  }
  .team__rail {
    flex: none; width: auto; height: 2px; align-self: auto; margin: 18px 0 14px;
    background: linear-gradient(90deg, transparent, rgba(28,100,190,0.28) 14%, rgba(28,100,190,0.28) 86%, transparent);
  }
  .team__members { margin-left: 0; }
  .team__members .person { max-width: 100%; flex-basis: 100%; }
}
@media (max-width: 600px) {
  .pcard { flex-basis: 172px; width: 172px; }
}

/* ════════════════════════════════════════════════════════════════════
   PASSWORD GATE — экран авторизации перед доступом к порталу
   ════════════════════════════════════════════════════════════════ */
body.is-locked { overflow: hidden; }

.gate {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  background:
    radial-gradient(120% 80% at 50% 0%, rgba(0,183,240,0.06), transparent 60%),
    linear-gradient(180deg, var(--bg), var(--bg-soft));
}
.gate[hidden] { display: none; }
.gate__card {
  width: 100%; max-width: 380px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-md);
  padding: 38px 34px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.gate__card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--lead-ring);
}
.gate__dot {
  width: 12px; height: 12px; border-radius: 999px;
  background: var(--lead-ring);
  box-shadow: 0 0 0 5px rgba(0,183,240,0.14);
  margin: 0 auto 22px;
}
.gate__brand {
  font-family: var(--font-mono);
  font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 8px;
}
.gate__title {
  font-size: 20px; font-weight: 600; letter-spacing: -0.02em;
  margin: 0;
}
.gate__sub {
  margin: 10px 0 24px;
  font-size: 13px; line-height: 1.5; color: var(--ink-3);
}
.gate__field { display: flex; flex-direction: column; gap: 10px; }
.gate__input {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  background: var(--bg-soft);
  padding: 12px 14px;
  font-size: 14px; color: var(--ink);
  outline: none;
  transition: border-color 160ms ease, box-shadow 160ms ease;
}
.gate__input::placeholder { color: var(--ink-4); }
.gate__input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(28,100,190,0.12);
}
.gate__btn {
  width: 100%;
  border: 0; border-radius: var(--r-md);
  background: var(--accent); color: #fff;
  padding: 12px 14px;
  font-size: 14px; font-weight: 500; letter-spacing: -0.005em;
  transition: background 160ms ease, transform 120ms ease;
}
.gate__btn:hover { background: #17539E; }
.gate__btn:active { transform: translateY(1px); }
.gate__error {
  margin-top: 14px;
  font-size: 12.5px; color: #9E2B3D;
  background: #FBF0F2; border: 1px solid #EBC9CF;
  border-radius: var(--r-sm);
  padding: 8px 10px;
}
.gate__error[hidden] { display: none; }
.gate__foot {
  margin-top: 22px;
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.06em;
  color: var(--ink-4);
}
@keyframes gate-shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-7px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(3px); }
}
.gate--shake .gate__card { animation: gate-shake 380ms ease; }

/* ════════════════════════════════════════════════════════════════════
   SENIORITY LEVEL BADGES (A / B / C) + legend
   A = solid (highest weight), B = soft, C = outline — visual hierarchy
   ════════════════════════════════════════════════════════════════ */
.lvl {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 17px; height: 17px; padding: 0 3px;
  border-radius: 5px;
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 500; line-height: 1; letter-spacing: 0;
  flex-shrink: 0; vertical-align: middle;
}
.lvl--a { background: var(--accent);      color: #fff;          border: 1px solid var(--accent); }
.lvl--b { background: var(--accent-soft); color: var(--accent); border: 1px solid rgba(28,100,190,0.28); }
.lvl--c { background: var(--bg-soft);     color: var(--ink-3);  border: 1px solid var(--line); }
.pcard__name .lvl { margin-left: 2px; }

.levels-legend {
  display: flex; flex-wrap: wrap; align-items: center; gap: 8px 18px;
  margin-top: 24px;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.02em;
  color: var(--ink-3);
}
.levels-legend__title {
  text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-4); font-size: 10.5px;
}
.ll-item { display: inline-flex; align-items: center; gap: 7px; }
</style>

<script>

  var btn   = document.getElementById('gate-btn');

  function b64(b){ var s=atob(b), a=new Uint8Array(s.length); for(var i=0;i<s.length;i++) a[i]=s.charCodeAt(i); return a; }

  async function deriveKey(pw){
    var base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64(P.salt), iterations:P.iterations, hash:'SHA-256' },
      base, { name:'AES-GCM', length:256 }, false, ['decrypt']
    );
  }

  function reveal(html){
    app.innerHTML = html;
    // <script> inserted via innerHTML does not run — re-create them so it does
    app.querySelectorAll('script').forEach(function(old){
      var s = document.createElement('script');
      if (old.src) s.src = old.src; else s.textContent = old.textContent;
      old.replaceWith(s);
    });
    gate.setAttribute('hidden','');
    document.body.classList.remove('is-locked');
  }

  function deny(){
    err.hidden = false;
    input.value = '';
    input.focus();
    gate.classList.add('gate--shake');
    setTimeout(function(){ gate.classList.remove('gate--shake'); }, 400);
  }

  var busy = false;
  async function attempt(){
    if (busy) return;
    if (!(window.crypto && crypto.subtle)){
      err.textContent = 'Браузер не поддерживает шифрование (нужен HTTPS и современный браузер).';
      err.hidden = false; return;
    }
    busy = true; btn.disabled = true; var label = btn.textContent; btn.textContent = 'Проверка…';
    try {
      var key = await deriveKey(input.value);
      var buf = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(P.iv) }, key, b64(P.ct));
      reveal(new TextDecoder().decode(buf));   // success
    } catch (e) {
      deny();                                  // wrong password -> GCM auth fails
    } finally {
      busy = false; btn.disabled = false; btn.textContent = label;
    }
  }

  btn.addEventListener('click', attempt);
  input.addEventListener('keydown', function(e){
    if (e.key === 'Enter'){ e.preventDefault(); attempt(); }
    else if (!err.hidden){ err.hidden = true; }
  });
  input.focus();
})();
</script>

</body>
</html>
